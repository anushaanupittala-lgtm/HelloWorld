name: Stock Scanner

on:
  workflow_dispatch:

  schedule:
    - cron: "0 10 * * 1-5"

jobs:
  scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install -r requirements.txt

      - name: Run Scanner
        run: |
          python app.py

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: stock-signals
          path: output/
